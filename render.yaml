services:
  - type: web
    name: yacht-platform-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt ; pip install "curl-cffi==0.6.4" --prefer-binary --quiet || true ; python -m playwright install chromium --with-deps || true
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
