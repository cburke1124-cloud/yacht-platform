services:
  - type: web
    name: yacht-platform-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt ; pip install "curl-cffi>=0.7.0" --prefer-binary --quiet || true ; PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/pw-browsers python -m playwright install chromium || true
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/pw-browsers
